name = "overcast"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# Cloudflare Pages configuration
# Static files (HTML, CSS, JS) are served from root
# API routes are handled by Pages Functions in /functions directory

# Pages supports two environments: production and preview
# production = main branch
# preview = all other branches (pull requests, etc.)

# Note: The actual API token should be set as a secret via the dashboard or CLI:
#   wrangler pages secret put CLOUDFLARE_API_TOKEN --project-name overcast
#   or via the Cloudflare Dashboard under Settings → Environment variables
