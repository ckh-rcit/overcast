name = "overcast"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./frontend"

# This configuration uses Cloudflare Pages with a Worker
# The frontend will be served from Pages, and the API will be handled by a Worker

# Worker configuration for API routes
[env.production]
name = "overcast-production"

[env.staging]
name = "overcast-staging"

# Note: The actual API token should be set as a secret, not in this file.
# To add the secret, run:
#   wrangler secret put CLOUDFLARE_API_TOKEN
#   wrangler secret put CLOUDFLARE_API_TOKEN --env production
#   wrangler secret put CLOUDFLARE_API_TOKEN --env staging
